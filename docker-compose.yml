# Lokale Testumgebung für GOTO
#
#   docker compose up -d --build
#   -> http://localhost:8088/goto/admin          (Apache, wie Shared-Hosting)
#
# Zusätzlich lassen sich die nginx-/Caddy-Beispiel-Configs aus docs/
# gegen dieselben Dateien testen:
#
#   docker compose --profile servers up -d
#   -> http://localhost:8089/goto/admin          (nginx + PHP-FPM)
#   -> http://localhost:8090/goto/admin          (Caddy + PHP-FPM)
#
# Die Container verwenden die ECHTEN Beispieldateien (docs/nginx.example.conf,
# docs/Caddyfile.example); beim Start wird nur die FPM-Adresse bzw. die
# Domain per sed auf die Container-Umgebung umgeschrieben.
services:
  web:
    build: .
    container_name: goto
    ports:
      - "8088:80"
    volumes:
      - ./:/var/www/html/goto
    # Optionaler Test-Login per ENV (überschreibt config.php). Datei optional.
    env_file:
      - path: test.env
        required: false
    restart: unless-stopped

  php-fpm:
    image: php:8.2-fpm-alpine
    profiles: [servers]
    volumes:
      - ./:/var/www/goto

  nginx:
    image: nginx:alpine
    profiles: [servers]
    depends_on: [php-fpm]
    ports:
      - "8089:80"
    volumes:
      - ./:/var/www/goto:ro
      - ./docs/nginx.example.conf:/tmp/goto.conf:ro
    command: >
      sh -c "sed -e 's#unix:/run/php/php-fpm.sock#php-fpm:9000#'
      /tmp/goto.conf > /etc/nginx/conf.d/default.conf
      && exec nginx -g 'daemon off;'"

  caddy:
    image: caddy:2-alpine
    profiles: [servers]
    depends_on: [php-fpm]
    ports:
      - "8090:80"
    environment:
      GOTO_FPM: php-fpm:9000
    volumes:
      - ./:/var/www/goto:ro
      - ./docs/Caddyfile.example:/tmp/Caddyfile:ro
    command: >
      sh -c "sed -e 's/^deine-domain.de {/:80 {/'
      /tmp/Caddyfile > /etc/caddy/Caddyfile
      && exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"
