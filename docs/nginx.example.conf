# Beispiel-nginx-Konfiguration für GOTO
#
# nginx wertet KEINE .htaccess aus – die Logik daraus wird hier nachgebildet:
#   - Front-Controller: unbekannte Pfade an index.php
#   - schöne Admin-URL /admin
#   - sensible Dateien sperren
#
# Annahme: GOTO liegt unter /var/www/goto und ist als /goto/ erreichbar.
# Für die Domain-Wurzel die /goto/-Präfixe entsprechend entfernen.
# PHP-FPM-Socket ggf. an deine Installation anpassen.

server {
    listen 80;
    server_name deine-domain.de;
    root /var/www;

    # Sensible Dateien niemals ausliefern
    location ~* /goto/.*\.(json|md|bak|tmp)$        { return 404; }
    location ~  /goto/\.                            { return 404; }   # Dotfiles (.ht_*)
    location =  /goto/config.php                    { return 404; }

    # Schöne Admin-URL: /goto/admin -> admin.php
    location = /goto/admin {
        try_files /goto/admin.php =404;
    }

    # PHP ausführen
    location ~ \.php$ {
        include       fastcgi_params;
        fastcgi_pass  unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Front-Controller: echte Dateien direkt, alles andere (= Kürzel) an index.php.
    # index.php ermittelt das Kürzel selbst aus der angefragten URL.
    location /goto/ {
        try_files $uri $uri/ /goto/index.php;
    }
}
