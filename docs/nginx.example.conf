# Beispiel-nginx-Konfiguration für GOTO
#
# nginx wertet KEINE .htaccess aus – die Logik daraus wird hier nachgebildet:
#   - Front-Controller: unbekannte Pfade (= Kürzel) an index.php
#   - schöne Admin-URL /admin
#   - sensible Dateien sperren (inkl. backups/ über die *.json-Regel)
#
# Gut zu wissen: Der Authorization-Header (API) und Query-Parameter
# (?utm_source=…) kommen unter nginx/FPM ohne Zusatzkonfiguration an.
# Nach dem Einrichten im Admin die **Diagnose** öffnen – sie prüft
# Rewriting und Dateischutz direkt im Browser.
#
# Annahme: GOTO liegt unter /var/www/goto und ist als /goto/ erreichbar.
# Für die Domain-Wurzel die /goto/-Präfixe entsprechend entfernen.
# PHP-FPM-Adresse ggf. anpassen (Unix-Socket oder z. B. 127.0.0.1:9000).

server {
    listen 80;
    server_name deine-domain.de;
    root /var/www;

    # Für HTTPS-Betrieb:
    #   listen 443 ssl;  +  ssl_certificate / ssl_certificate_key
    # und im PHP-Block unten zusätzlich  fastcgi_param HTTPS on;
    # aktivieren – sonst erkennt GOTO kein HTTPS (HSTS, secure-Cookies).

    # Sensible Dateien niemals ausliefern
    location ~* /goto/.*\.(json|md|bak|tmp)$ { return 404; }
    location ~  /goto/(.*/)?\.               { return 404; }   # Dotfiles (.ht_*), auch in Unterordnern
    location =  /goto/config.php             { return 404; }

    # Schöne Admin-URL: /goto/admin -> admin.php
    # Wichtig: rewrite…last statt try_files – try_files würde die Datei hier
    # STATISCH ausliefern (PHP-Quelltext!), weil es die Location nicht neu matcht.
    location = /goto/admin {
        rewrite ^ /goto/admin.php last;
    }

    # PHP ausführen
    location ~ \.php$ {
        include       fastcgi_params;
        fastcgi_pass  unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Bei HTTPS-Betrieb aktivieren:
        # fastcgi_param HTTPS on;
    }

    # Front-Controller: echte Dateien direkt, alles andere (= Kürzel) an
    # index.php. Wichtig: $is_args$args anhängen, sonst gehen Query-
    # Parameter (?utm_source=…) beim Fallback verloren.
    location /goto/ {
        index index.php;
        try_files $uri $uri/ /goto/index.php$is_args$args;
    }
}
